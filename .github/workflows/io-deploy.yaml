name: IO WWW Deploy
on:
    workflow_call:
        secrets:
            ENV_CONTENT:
                required: true
            AIO_CONTENT:
                required: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: io/www

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22.x'
                  cache: 'npm'
                  cache-dependency-path: io/www/package.json

            - name: Install dependencies
              run: npm ci

            - name: Run tests with coverage
              run: npm test

            - name: Install AIO CLI
              if: success()
              run: npm install -g @adobe/aio-cli@11.1.0

            - name: Prepare .aio and .env files
              env:
                  ENV_CONTENT: ${{ secrets.ENV_CONTENT }}
                  AIO_CONTENT: ${{ secrets.AIO_CONTENT }}
              run: |
                  missing_secrets=()

                  [ -z "$ENV_CONTENT" ] && missing_secrets+=("ENV_CONTENT")
                  [ -z "$AIO_CONTENT" ] && missing_secrets+=("AIO_CONTENT")

                  if [ ${#missing_secrets[@]} -ne 0 ]; then
                    echo "Error: The following required secrets are empty:"
                    printf '%s\n' "${missing_secrets[@]}"
                    exit 1
                  fi

                  printf '%s' "$ENV_CONTENT" > .env
                  printf '%s' "$AIO_CONTENT" > .aio

            - name: Deploy action
              run: aio app deploy -v
