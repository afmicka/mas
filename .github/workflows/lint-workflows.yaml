name: Lint GitHub Workflows
on:
    pull_request:
        types: [opened, synchronize, reopened]
        paths:
            - '.github/workflows/**'

jobs:
    actionlint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Run actionlint
              uses: rhysd/actionlint@v1
