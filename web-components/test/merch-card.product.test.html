<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Merch Card Product variant test page</title>
        <style>
            main {
                display: flex;
                align-items: center;
                gap: 20px;
                flex-direction: column;
                padding-top: 80px;
            }
            mas-commerce-service {
                display: none;
            }
        </style>
        <mas-commerce-service env="stage"></mas-commerce-service>
    </head>

    <body>
        <main>
            <div class="two-merch-cards product"></div>
        </main>
        <template id="fragment-product">
            <merch-card>
                <aem-fragment fragment="fragment-product"></aem-fragment>
            </merch-card>
        </template>

        <script type="module">
            import { runTests } from '@web/test-runner-mocha';
            import { expect } from '@esm-bundle/chai';
            import { mockFetch } from './mocks/fetch.js';
            import { mockIms } from './mocks/ims.js';
            import { withWcs } from './mocks/wcs.js';
            import { withAem } from './mocks/aem.js';
            import { delay, getTemplateContent, oneEvent } from './utils.js';
            import '../src/mas.js';

            runTests(async () => {
                mockIms();
                await mockFetch(withWcs, withAem);
                const container = document.querySelector('main > div');

                describe('merch-card web component with product variant', () => {
                    beforeEach(() => {
                        container.innerHTML = '';
                    });
                    it('should exist in the HTML document', async () => {
                        const [card] = getTemplateContent('fragment-product');
                        container.append(card);
                        await card.checkReady();
                        expect(card).to.exist;
                        expect(card.quantitySelect).to.exist;
                        expect(card.title).to.equal('Test Product Card');
                        expect(card.description.includes('Product description'))
                            .to.be.true;
                        expect(card.ctas.length).to.equal(2);
                        expect(card.ctas[0].textContent).to.equal('Free trial');
                        expect(card.ctas[1].textContent).to.equal('Buy now');
                    });
                });
            });
        </script>
    </body>
</html>
