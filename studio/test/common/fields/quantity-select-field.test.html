<!doctype html>
<html>
    <head>
        <script type="module">
            window.process = { env: {} };
            window.__swc = { warn: () => {} };
        </script>
        <title>quantity-select-field unit tests</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <script src="../../../src/swc.js" type="module"></script>
    </head>
    <body>
        <script type="module">
            import { runTests } from '@web/test-runner-mocha';
            import { expect } from '@esm-bundle/chai';
            import sinon from 'sinon';
            import { createQuantitySelectValue, parseQuantitySelectValue } from '../../../src/common/fields/quantity-select.js';
            import '../../../src/fields/quantity-select-settings-field.js';
            import Events from '../../../src/events.js';

            runTests(() => {
                describe('quantity-select helpers', () => {
                    it('createQuantitySelectValue includes default-value', () => {
                        const markup = createQuantitySelectValue({
                            title: '',
                            min: '2',
                            step: '2',
                            defaultValue: '4',
                        });
                        expect(markup).to.include('default-value="4"');
                        expect(markup).to.include('min="2"');
                        expect(markup).to.include('step="2"');
                    });

                    it('parseQuantitySelectValue reads default-value', () => {
                        const parsed = parseQuantitySelectValue(
                            '<merch-quantity-select title="" min="2" max="10" step="2" default-value="6"></merch-quantity-select>',
                        );
                        expect(parsed.defaultValue).to.equal('6');
                        expect(parsed.min).to.equal('2');
                    });

                    it('parseQuantitySelectValue uses min when default-value is absent', () => {
                        const parsed = parseQuantitySelectValue(
                            '<merch-quantity-select min="3" max="10" step="1"></merch-quantity-select>',
                        );
                        expect(parsed.defaultValue).to.equal('3');
                    });

                    it('parseQuantitySelectValue empty value defaults defaultValue to 1', () => {
                        const parsed = parseQuantitySelectValue('');
                        expect(parsed.defaultValue).to.equal('1');
                    });
                });

                describe('quantity-select-field', () => {
                    it('re-aligns default to min when step change leaves default off the ladder', async () => {
                        const el = document.createElement('quantity-select-field');
                        el.value = createQuantitySelectValue({
                            title: '',
                            min: '2',
                            step: '1',
                            defaultValue: '3',
                        });
                        document.body.append(el);
                        await el.updateComplete;

                        const stepField = el.shadowRoot.querySelector('#quantity-selector-step');
                        stepField.value = '2';
                        stepField.dispatchEvent(new Event('input', { bubbles: true, composed: true }));
                        await el.updateComplete;

                        expect(el.defaultValue).to.equal('2');
                        expect(el.value).to.include('default-value="2"');
                        el.remove();
                    });

                    it('shows toast and keeps min when start is set above default quantity', async () => {
                        const stub = sinon.stub(Events.toast, 'emit');
                        const el = document.createElement('quantity-select-field');
                        el.value = createQuantitySelectValue({
                            title: '',
                            min: '1',
                            step: '1',
                            defaultValue: '3',
                        });
                        document.body.append(el);
                        await el.updateComplete;

                        const start = el.shadowRoot.querySelector('#quantity-selector-start');
                        start.value = '4';
                        start.dispatchEvent(new Event('input', { bubbles: true, composed: true }));
                        await el.updateComplete;

                        expect(stub.calledOnce).to.be.true;
                        expect(stub.firstCall.args[0].variant).to.equal('negative');
                        expect(el.min).to.equal('1');
                        stub.restore();
                        el.remove();
                    });

                    it('shows toast and keeps default when default is set below min', async () => {
                        const stub = sinon.stub(Events.toast, 'emit');
                        const el = document.createElement('quantity-select-field');
                        el.value = createQuantitySelectValue({
                            title: '',
                            min: '5',
                            step: '1',
                            defaultValue: '5',
                        });
                        document.body.append(el);
                        await el.updateComplete;

                        const def = el.shadowRoot.querySelector('#quantity-selector-default');
                        def.value = '3';
                        def.dispatchEvent(new Event('input', { bubbles: true, composed: true }));
                        await el.updateComplete;

                        expect(stub.calledOnce).to.be.true;
                        expect(stub.firstCall.args[0].variant).to.equal('negative');
                        expect(el.defaultValue).to.equal('5');
                        stub.restore();
                        el.remove();
                    });
                });

                describe('quantity-select-settings-field', () => {
                    it('renders the switch when settingsDefaults is empty', async () => {
                        const el = document.createElement('quantity-select-settings-field');
                        el.id = 'quantity-select-settings-field';
                        el.label = 'Show quantity selector';
                        el.settingsDefaults = '';
                        el.value = '<merch-quantity-select/>';
                        document.body.append(el);
                        await el.updateComplete;

                        const toggle = el.querySelector('#quantity-select-settings-field-toggle');
                        expect(toggle).to.exist;
                        el.remove();
                    });
                });
            });
        </script>
    </body>
</html>
