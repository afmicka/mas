<!doctype html>
<html>
    <head>
        <script>
            window.__swc = { warn: () => {} };
        </script>
        <script type="module">
            window.process = { env: {} };
            window.__swc = { warn: () => {} };
        </script>
        <title>merch-card-collection-editor test page</title>
        <meta name="nofollow-links" content="on" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="../../style.css" />
        <style>
            body {
                margin: 32px;
                display: flex;
                flex-direction: column;
                align-items: center;
                background-color: white;
            }

            main {
                width: 100%;
                padding: 0 100px;
            }

            merch-card-collection-editor {
                max-width: 1000px;
            }

            sp-theme {
                display: contents;
            }
        </style>
    </head>
    <body>
        <script type="module">
            import { runTests } from '@web/test-runner-mocha';
            import { expect } from '@esm-bundle/chai';
            import { spy } from 'sinon';
            import { initElementFromTemplate } from '../utils.js';

            import '../../src/swc.js';
            import '../../src/editor-panel.js';
            import '../../src/editors/merch-card-collection-editor.js';
            import { Fragment } from '../../src/aem/fragment.js';
            import { FragmentStore } from '../../src/reactivity/fragment-store.js';
            import { COLLECTION_MODEL_PATH } from '../../src/constants.js';
            import Store from '../../src/store.js';

            runTests(async () => {
                const originalFetch = window.fetch;
                window.fetch = async function (args) {
                    const { href } = new URL(args);
                    if (/querybuilder.json\?path=\/content\/dam\/mas/.test(href)) {
                        return originalFetch('/test/mocks/folders.json');
                    }
                    return originalFetch(...arguments);
                };
                describe('merch-card-collection-editor custom element', async () => {
                    beforeEach(async () => {
                        const editorPanel = initElementFromTemplate('merch-card-collection-editor');
                    });
                    it('should render', async () => {
                        const editor = document.querySelector('editor-panel');
                        const collectionFragment = await originalFetch(
                            '/test/mocks/adobe/sites/cf/fragments/collection.json',
                        ).then((res) => res.json());
                        const fragmentStore = new FragmentStore(new Fragment(collectionFragment));
                        await editor.editFragment(fragmentStore, 1);
                        expect(editor.querySelector('merch-card-collection-editor')).to.exist;
                    });
                });

                describe('grouped variation tags', () => {
                    const spTheme = () => document.querySelector('main sp-theme');
                    let groupedTestHost;

                    beforeEach(() => {
                        groupedTestHost = document.createElement('div');
                        groupedTestHost.id = 'grouped-collection-editor-tests';
                        spTheme().appendChild(groupedTestHost);
                    });

                    afterEach(() => {
                        groupedTestHost?.remove();
                        groupedTestHost = null;
                        Store.showCloneDialog.set(false);
                    });

                    function groupedCollectionFragmentData(overrides = {}) {
                        return {
                            id: 'grouped-collection-id',
                            path: '/content/mas/collections/en_US/all/pzn/grouped-collection',
                            model: { path: COLLECTION_MODEL_PATH, name: 'Collection', title: 'Collection' },
                            title: 'Grouped collection',
                            tags: [],
                            fields: [
                                { name: 'label', type: 'text', multiple: false, values: ['Label'] },
                                { name: 'queryLabel', type: 'text', multiple: false, values: [''] },
                                { name: 'icon', type: 'text', multiple: false, values: [''] },
                                { name: 'iconLight', type: 'text', multiple: false, values: [''] },
                                { name: 'cards', type: 'content-reference', multiple: true, values: [] },
                                { name: 'collections', type: 'content-reference', multiple: true, values: [] },
                                {
                                    name: 'pznTags',
                                    type: 'text',
                                    multiple: true,
                                    values: ['mas:locale/fr_FR', 'mas:locale/de_DE'],
                                },
                            ],
                            references: [],
                            ...overrides,
                        };
                    }

                    it('should render grouped variation tag picker in sidenav when path is a grouped variation', async () => {
                        const editor = document.createElement('merch-card-collection-editor');
                        editor.updateFragment = () => {};
                        const fragmentStore = new FragmentStore(new Fragment(groupedCollectionFragmentData()));
                        editor.fragmentStore = fragmentStore;
                        groupedTestHost.appendChild(editor);
                        await editor.updateComplete;

                        const groupedGroup = editor.shadowRoot.querySelector('#grouped-variation-tags');
                        expect(groupedGroup).to.exist;
                        const picker = groupedGroup.querySelector('aem-tag-picker-field');
                        expect(picker).to.exist;
                        expect(picker.getAttribute('value')).to.equal('mas:locale/fr_FR,mas:locale/de_DE');
                    });

                    it('should not render grouped variation tag picker when path is not grouped', async () => {
                        const editor = document.createElement('merch-card-collection-editor');
                        editor.updateFragment = () => {};
                        const data = groupedCollectionFragmentData({
                            path: '/content/mas/collections/en_US/all',
                        });
                        const fragmentStore = new FragmentStore(new Fragment(data));
                        editor.fragmentStore = fragmentStore;
                        groupedTestHost.appendChild(editor);
                        await editor.updateComplete;

                        expect(editor.shadowRoot.querySelector('#grouped-variation-tags')).to.not.exist;
                    });

                    it('should update pznTags on tag picker change', async () => {
                        const editor = document.createElement('merch-card-collection-editor');
                        editor.updateFragment = () => {};
                        const fragmentStore = new FragmentStore(new Fragment(groupedCollectionFragmentData()));
                        const updateSpy = spy(fragmentStore, 'updateField');
                        editor.fragmentStore = fragmentStore;
                        groupedTestHost.appendChild(editor);
                        await editor.updateComplete;

                        const picker = editor.shadowRoot.querySelector('#grouped-variation-tags aem-tag-picker-field');
                        picker.setAttribute('value', 'mas:locale/en_GB,mas:locale/en_IE');
                        picker.dispatchEvent(new Event('change', { bubbles: true, composed: true }));

                        expect(updateSpy.calledWith('pznTags', ['mas:locale/en_GB', 'mas:locale/en_IE'])).to.be.true;
                        updateSpy.restore();
                    });
                });
            });
        </script>
        <main>
            <sp-theme system="spectrum-two" color="light" scale="medium"></sp-theme>
        </main>
        <template id="merch-card-collection-editor">
            <div>
                <mas-repository base-url="http://localhost:2023/test/mocks"></mas-repository>
                <editor-panel></editor-panel>
            </div>
        </template>
    </body>
</html>
